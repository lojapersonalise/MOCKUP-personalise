<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mockup de Caneca 360º - Loja Personalise</title>
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="logo">Loja <span>Personalise</span></div>
    <div style="font-size:0.78rem; color:#9ca3af;">Mockup Premium 360º</div>
  </header>

  <div class="main">

    <div class="canvas-wrapper">
      
      <div class="canvas-container">
        
        <img src="logo-personalise.png" alt="Logo Personalise" class="watermark-logo" />
        
        <canvas id="canvas3d" width="800" height="500"></canvas>
        <div class="canvas-hint">🖱️ Arraste para rotacionar · Scroll para zoom</div>

      </div>

    </div><div class="sidebar">

      <div class="sidebar-section">
        <div class="section-title">Arte / Estampa</div>
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
          ⬆️ Carregar Imagem
        </button>
        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp" />
        <div class="art-preview" id="artPreview">
          <img id="artThumb" src="" alt="preview" />
          <span id="artPlaceholder">Nenhuma arte carregada</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Ajustar Arte</div>
        <div class="control-row"><div class="control-label"><span>Posição Horizontal</span><span id="valOffsetX">0</span></div><input type="range" id="offsetX" min="-1" max="1" step="0.01" value="0" /></div>
        <div class="control-row"><div class="control-label"><span>Posição Vertical</span><span id="valOffsetY">0</span></div><input type="range" id="offsetY" min="-1" max="1" step="0.01" value="0" /></div>
        <div class="control-row"><div class="control-label"><span>Tamanho</span><span id="valScale">100%</span></div><input type="range" id="artScale" min="10" max="300" step="1" value="100" /></div>
        <div class="control-row"><div class="control-label"><span>Rotação</span><span id="valRotation">0°</span></div><input type="range" id="artRotation" min="0" max="360" step="1" value="0" /></div>
        <div class="control-row"><div class="control-label"><span>Opacidade</span><span id="valOpacity">100%</span></div><input type="range" id="artOpacity" min="0" max="100" step="1" value="100" /></div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Cor da Caneca</div>
        <div class="mug-colors" id="mugColors">
          <div class="color-dot active" data-color="#ffffff" style="background:#ffffff; border-color:#e0e0e0;" title="Branco (Padrão)"></div>
          <div class="color-dot" data-color="#1A181C" style="background:#1A181C;"></div>
          <div class="color-dot" data-color="#9C525B" style="background:#9C525B;"></div>
          <div class="color-dot" data-color="#E24329" style="background:#E24329;"></div>
          <div class="color-dot" data-color="#F7D015" style="background:#F7D015;"></div>
          <div class="color-dot" data-color="#2386C2" style="background:#2386C2;"></div>
          <div class="color-dot" data-color="#F0A8B9" style="background:#F0A8B9;"></div>
          <div class="color-dot" data-color="#7FC84F" style="background:#7FC84F;"></div>
          <div class="color-dot" data-color="#AC89C1" style="background:#AC89C1;"></div>
          <div class="color-dot" data-color="#FA5019" style="background:#FA5019;"></div>
          <div class="color-dot custom" style="position:relative;">🎨<input type="color" id="mugColorPicker" value="#ffffff" title="Cor personalizada" /></div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Fundo da Cena</div>
        <div class="color-options" id="bgColors">
          <div class="color-dot active" data-bg="#6b2b8e" style="background:#6b2b8e; border-color:#ffffff;" title="Roxo Premium"></div>
          <div class="color-dot" data-bg="#ffffff" style="background:#ffffff; border-color:#e0e0e0;"></div>
          <div class="color-dot" data-bg="#1A181C" style="background:#1A181C;"></div>
          <div class="color-dot" data-bg="#9C525B" style="background:#9C525B;"></div>
          <div class="color-dot" data-bg="#E24329" style="background:#E24329;"></div>
          <div class="color-dot" data-bg="#F7D015" style="background:#F7D015;"></div>
          <div class="color-dot" data-bg="#2386C2" style="background:#2386C2;"></div>
          <div class="color-dot" data-bg="#F0A8B9" style="background:#F0A8B9;"></div>
          <div class="color-dot" data-bg="#7FC84F" style="background:#7FC84F;"></div>
          <div class="color-dot" data-bg="#AC89C1" style="background:#AC89C1;"></div>
          <div class="color-dot" data-bg="#FA5019" style="background:#FA5019;"></div>
          <div class="color-dot custom" style="position:relative;">🎨<input type="color" id="bgColorPicker" value="#6b2b8e" title="Cor personalizada" /></div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Exportar</div>
        <button class="btn-export" id="btnExport">💾 Baixar PNG</button>
        <button class="btn-reset" id="btnReset">🔄 Resetar tudo</button>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
